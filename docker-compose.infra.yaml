  # fully locally without any external LLM provider.
  # Also set LLM_PROVIDER=ollama in api/.env and start with:
  #   docker compose -f docker-compose.yaml -f docker-compose.infra.yaml --profile local up -d
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: memwire-ollama
  #   profiles: ["local"]
  #   restart: unless-stopped
  #   ports:
  #     - "${OLLAMA_PORT:-11434}:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 30s
  #   networks:
  #     - memwire-network
  #
  # ollama-init:
  #   image: ollama/ollama:latest
  #   container_name: memwire-ollama-init
  #   profiles: ["local"]
  #   depends_on:
  #     ollama:
  #       condition: service_healthy
  #   environment:
  #     - OLLAMA_HOST=http://ollama:11434
  #   entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_LLM_MODEL:-llama3.2} && ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text}"]
  #   networks:
  #     - memwire-network
  #   restart: "no"

  # ── Database ──────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: memwire-db
    restart: unless-stopped
    shm_size: 128mb
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memwire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memwire}
      POSTGRES_DB: ${POSTGRES_DB:-memwire}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memwire} -d ${POSTGRES_DB:-memwire}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memwire-network

volumes:
  postgres_data:
    name: memwire-postgres-data
  # ollama_data:          # uncomment when Ollama is enabled
  #   name: memwire-ollama-data

networks:
  memwire-network:
    name: memwire-network
    driver: bridge
