services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  memwire-api:
    container_name: memwire-api
    build:
      context: ..
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    environment:
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=sqlite:////data/memwire.db
      - ORG_ID=default
      - QDRANT_COLLECTION_PREFIX=mw_
    volumes:
      - memwire_data:/data
    restart: unless-stopped

volumes:
  qdrant_storage:
  memwire_data:
