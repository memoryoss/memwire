services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: memwire-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  memwire:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memwire
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_started
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: sqlite:////data/memwire.db
      MEMWIRE_ORG_ID: ${MEMWIRE_ORG_ID:-default}
      MEMWIRE_COLLECTION_PREFIX: ${MEMWIRE_COLLECTION_PREFIX:-mw_}
      MEMWIRE_API_KEYS: ${MEMWIRE_API_KEYS:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fastembed}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-gpt-4o-mini}
      OPENAI_AVAILABLE_MODELS: ${OPENAI_AVAILABLE_MODELS:-gpt-4o-mini,gpt-4o}
      MEMWIRE_CORS_ORIGINS: ${MEMWIRE_CORS_ORIGINS:-*}
    volumes:
      - memwire_data:/data
    restart: unless-stopped

volumes:
  qdrant_storage:
  memwire_data:
