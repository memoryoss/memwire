name: memwire

include:
  - docker-compose.infra.yaml

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: production
    image: memwire/api:${VERSION:-latest}
    pull_policy: build
    container_name: memwire-api
    restart: unless-stopped
    command: --migrate
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - api/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-production}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - memwire-network

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
      target: production
    image: memwire/ui:${VERSION:-latest}
    pull_policy: build
    container_name: memwire-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    networks:
      - memwire-network

networks:
  memwire-network:
    name: memwire-network
    driver: bridge
